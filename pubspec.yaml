name: trufi
description: "Trufi Sana'a - Offline transit navigation app for Sana'a, Yemen"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  provider: ^6.1.5+1
  go_router: ^17.0.1
  trufi_core_interfaces:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_interfaces
  trufi_core_utils:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_utils
  trufi_core_about:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/screens/trufi_core_about
  trufi_core_transport_list:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/screens/trufi_core_transport_list
  trufi_core_maps:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_maps
  trufi_core_routing:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_routing
  trufi_core_saved_places:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/screens/trufi_core_saved_places
  trufi_core_home_screen:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/screens/trufi_core_home_screen
  trufi_core_search_locations:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_search_locations
  trufi_core_settings:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/screens/trufi_core_settings
  trufi_core_ui:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_ui
  trufi_core_navigation:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_navigation
  trufi_core_poi_layers:
    git:
      url: https://github.com/guss1215/trufi-core.git
      ref: sanaa-ar
      path: packages/trufi_core_poi_layers
  latlong2: ^0.9.1
  maplibre_gl: ^0.25.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

